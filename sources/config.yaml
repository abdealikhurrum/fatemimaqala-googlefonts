# Google Fonts build config (gftools builder).
#
# The feature file has been rehabilitated (see ../REHAB.md); this builds the
# shaping-complete font. Vertical metrics are post-patched until folded in.
sources:
  - Fatemi-Maqala-Regular.ufo
familyName: Fatemi Maqala
outputDir: ../fonts
buildVariable: false
buildOTF: false
buildTTF: true
checkCompatibility: false
