# Google Fonts build config (gftools builder).
#
# NOTE: building with the full feature set currently fails — the feature code
# inherited from the FontForge source needs rehabilitation (see ../REHAB.md).
# The stage-1 structural artifact in ../fonts was built with features disabled
# to validate outlines/metrics/naming/hinting against Font Bakery. Once the
# feature file is rehabilitated, point `sources` at the UFO (which carries the
# full features.fea) and this config builds the shaping-complete font.
sources:
  - Fatemi-Maqala-Regular.ufo
familyName: Fatemi Maqala
outputDir: ../fonts
buildVariable: false
buildOTF: false
buildTTF: true
checkCompatibility: false
