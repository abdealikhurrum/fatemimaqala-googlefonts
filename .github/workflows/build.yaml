name: Build font and QA

# Builds the font with the Google Fonts pipeline and runs Font Bakery.
# Builds the font and runs Font Bakery. Feature file is rehabilitated and
# compiles; remaining FAILs are glyph-coverage items (see qa/).

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build
        run: cd sources && gftools builder config.yaml
      - name: Font Bakery
        continue-on-error: true
        run: |
          fontbakery check-googlefonts -l WARN --succinct \
            fonts/*.ttf || true
      - uses: actions/upload-artifact@v4
        with:
          name: fonts
          path: fonts/*.ttf
